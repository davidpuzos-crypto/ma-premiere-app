<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ma Première App</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0c;
      --surface: #1a1916;
      --accent: #e8c87a;
      --accent-dim: #c4a452;
      --text: #f0ece3;
      --muted: #7a7468;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem;
      overflow: hidden;
    }

    /* Fond texturé / grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,200,122,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.4s;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.6s;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--accent);
      color: #0f0e0c;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 0.85rem 2.2rem;
      border: none;
      border-radius: 0;
      cursor: pointer;
      position: relative;
      transition: background 0.2s ease, transform 0.15s ease;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.8s;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 3px;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      background: transparent;
      border: 1px solid rgba(0,0,0,0.15);
      pointer-events: none;
    }

    .btn:hover {
      background: var(--accent-dim);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    /* Alerte personnalisée */
    .toast {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 0.9rem 1.8rem;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <p class="eyebrow">Ma première application</p>
    <h1>Bonjour,<br /><span>le monde !</span></h1>
    <p class="subtitle">
      Bienvenue dans ton premier projet web.<br />
      Clique sur le bouton pour commencer l'aventure.
    </p>
    <button class="btn" onclick="afficherMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      Cliquez ici
    </button>
  </div>

  <div class="toast" id="toast">🎉 Félicitations — ton app fonctionne !</div>

  <script>
    function afficherMessage() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>

</body>
</html>
